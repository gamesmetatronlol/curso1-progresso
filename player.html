<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player de Aula</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    #player-wrapper {
      position: relative;
      width: 100%;
      max-width: 860px;
      aspect-ratio: 16/9;
      background: #111;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    #player-wrapper iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Overlay de aviso quando pula o vídeo */
    #skip-warning {
      display: none;
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.82);
      align-items: center;
      justify-content: center;
      z-index: 10;
      flex-direction: column;
      gap: 14px;
      text-align: center;
      padding: 24px;
    }
    #skip-warning.show { display: flex; }
    #skip-warning .icon { font-size: 2.4rem; }
    #skip-warning p {
      font-size: 1rem;
      color: #f0c040;
      max-width: 320px;
      line-height: 1.5;
    }
    #skip-warning button {
      margin-top: 8px;
      padding: 10px 28px;
      background: #f0c040;
      color: #111;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    #skip-warning button:hover { background: #ffd700; }

    /* Barra de progresso do vídeo */
    #progress-bar-wrap {
      width: 100%;
      max-width: 860px;
      margin-top: 12px;
    }
    #progress-label {
      font-size: 0.8rem;
      color: #aaa;
      margin-bottom: 5px;
    }
    #progress-track {
      width: 100%;
      height: 8px;
      background: #2a2a2a;
      border-radius: 99px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #f0c040, #ff7043);
      border-radius: 99px;
      transition: width 0.6s ease;
    }

    /* Status badge */
    #status-badge {
      margin-top: 10px;
      font-size: 0.82rem;
      padding: 5px 14px;
      border-radius: 99px;
      background: #1e1e1e;
      color: #888;
      display: inline-block;
      transition: all 0.3s;
    }
    #status-badge.done {
      background: #1a3d1a;
      color: #4caf50;
    }

    /* ID da aula (passado via URL param) */
    #aula-label {
      margin-top: 18px;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div id="player-wrapper">
    <div id="ytplayer"></div>

    <div id="skip-warning">
      <div class="icon">⚠️</div>
      <p>Você avançou o vídeo.<br>Por favor, assista ao conteúdo completo antes de prosseguir.</p>
      <button onclick="dismissWarning()">Entendi, vou assistir</button>
    </div>
  </div>

  <div id="progress-bar-wrap">
    <div id="progress-label">Progresso do vídeo: <span id="pct">0</span>%</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="status-badge">⏳ Aguardando conclusão...</div>
  <div id="aula-label">carregando...</div>

<script>
  // ─────────────────────────────────────────────
  // Lê parâmetros da URL:
  //   ?video=VIDEO_ID   → ID do YouTube
  //   ?aula=aula1       → chave usada no localStorage
  //   ?threshold=90     → % mínima pra considerar concluído (padrão 85)
  // ─────────────────────────────────────────────
  const params    = new URLSearchParams(location.search);
  const VIDEO_ID  = params.get('video')     || 'dQw4w9WgXcQ'; // substitua pelo padrão
  const AULA_KEY  = params.get('aula')      || 'aula_desconhecida';
  const THRESHOLD = parseInt(params.get('threshold') || '85');

  document.getElementById('aula-label').textContent = 'Aula: ' + AULA_KEY;

  // ─────────────────────────────────────────────
  // Controle de progresso
  // ─────────────────────────────────────────────
  let maxReached  = 0;   // maior posição (segundos) que o aluno chegou naturalmente
  let lastTime    = 0;   // último tempo registrado
  let concluded   = false;
  let ticker      = null;
  let player      = null;
  let warningShown = false;

  // ─────────────────────────────────────────────
  // YouTube IFrame API
  // ─────────────────────────────────────────────
  const tag = document.createElement('script');
  tag.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(tag);

  window.onYouTubeIframeAPIReady = function () {
    player = new YT.Player('ytplayer', {
      videoId: VIDEO_ID,
      playerVars: {
        rel: 0,
        modestbranding: 1,
        fs: 1          // ← habilita fullscreen
      },
      events: {
        onStateChange: onStateChange,
        onReady: onPlayerReady
      }
    });
  };

  function onPlayerReady() {
    // Se já foi concluído antes (localStorage), marca como feito
    const saved = localStorage.getItem('video_' + AULA_KEY);
    if (saved === 'done') markDone(false);
  }

  function onStateChange(e) {
    const YT = window.YT.PlayerState;

    if (e.data === YT.PLAYING) {
      // Inicia o ticker de monitoramento
      ticker = setInterval(checkProgress, 1000);
    } else {
      clearInterval(ticker);
    }
  }

  function checkProgress() {
    if (!player || concluded) return;

    const current  = player.getCurrentTime();
    const duration = player.getDuration();
    if (!duration) return;

    // ── Detecta pulo para frente ──────────────────
    const JUMP_TOLERANCE = 10; // segundos — ajuste se quiser
    if (current > maxReached + JUMP_TOLERANCE && !warningShown) {
      showWarning();
      player.seekTo(maxReached, true); // volta para onde estava
      return;
    }

    // Atualiza máximo alcançado (só avança, nunca retrocede)
    if (current > maxReached) maxReached = current;
    lastTime = current;

    // ── Atualiza barra ────────────────────────────
    const pct = Math.min(100, Math.round((maxReached / duration) * 100));
    document.getElementById('pct').textContent = pct;
    document.getElementById('progress-fill').style.width = pct + '%';

    // ── Verifica conclusão ────────────────────────
    if (pct >= THRESHOLD && !concluded) markDone(true);
  }

  function markDone(save) {
    concluded = true;
    clearInterval(ticker);

    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('pct').textContent = '100';

    const badge = document.getElementById('status-badge');
    badge.textContent = '✅ Vídeo concluído!';
    badge.classList.add('done');

    if (save) {
      localStorage.setItem('video_' + AULA_KEY, 'done');
    }

    // ── Envia sinal para o Google Sites (página pai) ──
    window.parent.postMessage({
      type: 'VIDEO_CONCLUIDO',
      aula: AULA_KEY
    }, '*');  // em produção, substitua '*' pela URL do seu Google Sites
  }

  // ─────────────────────────────────────────────
  // Aviso de pulo
  // ─────────────────────────────────────────────
  function showWarning() {
    warningShown = true;
    player.pauseVideo();
    document.getElementById('skip-warning').classList.add('show');
  }

  function dismissWarning() {
    warningShown = false;
    document.getElementById('skip-warning').classList.remove('show');
    player.playVideo();
  }
</script>
</body>
</html>
