<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progresso</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
        }

        .progress-wrapper {
            width: 100%;
            max-width: 860px;
        }

        .steps {
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }

        .track {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 6px;
            background: #1e3a5f;
            transform: translateY(-50%);
            border-radius: 3px;
            z-index: 0;
        }

        .track-fill {
            height: 100%;
            background: #4ecca3;
            border-radius: 3px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            z-index: 1;
            cursor: default;
        }

        .dot {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: #1e3a5f;
            border: 3px solid #1e3a5f;
            transition: all 0.4s ease;
            position: relative;
        }

        .step.done .dot {
            background: #4ecca3;
            border-color: #4ecca3;
            box-shadow: 0 0 10px rgba(78, 204, 163, 0.5);
        }

        .step.current .dot {
            background: #facc15;
            border-color: #facc15;
            box-shadow: 0 0 12px rgba(250, 204, 21, 0.6);
        }

        .label {
            font-size: 11px;
            font-weight: 600;
            color: #94a3b8;
            text-align: center;
            white-space: nowrap;
            transition: color 0.4s ease;
        }

        .step.done .label { color: #4ecca3; }
        .step.current .label { color: #facc15; }
    </style>
</head>
<body>
<div class="progress-wrapper">
    <div class="steps" id="steps">
        <div class="track"><div class="track-fill" id="trackFill"></div></div>
    </div>
</div>

<script>
    // ─── CONFIGURAÇÃO ───────────────────────────────────────────
    const ETAPAS = [
        { chave: 'c1a1', label: 'Aula 1' },
        { chave: 'c1a2', label: 'Aula 2' },
        { chave: 'c1a3', label: 'Aula 3' },
        { chave: 'c1e1', label: 'Exercício' }
    ];
    // ────────────────────────────────────────────────────────────

    function carregarProgresso() {
        const salvo = sessionStorage.getItem('progresso_curso');
        return salvo ? JSON.parse(salvo) : {};
    }

    function salvarProgresso(progresso) {
        sessionStorage.setItem('progresso_curso', JSON.stringify(progresso));
    }

    function renderizar(progresso) {
        const container = document.getElementById('steps');
        const trackFill = document.getElementById('trackFill');

        container.querySelectorAll('.step').forEach(el => el.remove());

        let ultimaConcluida = -1;
        ETAPAS.forEach((etapa, i) => {
            if (progresso[etapa.chave]) ultimaConcluida = i;
        });

        const currentIndex = Math.min(ultimaConcluida + 1, ETAPAS.length - 1);
        const percentual = ETAPAS.length <= 1 ? 0 : (ultimaConcluida / (ETAPAS.length - 1)) * 100;
        trackFill.style.width = percentual + '%';

        ETAPAS.forEach((etapa, i) => {
            const step = document.createElement('div');
            step.className = 'step';

            if (progresso[etapa.chave]) {
                step.classList.add('done');
            } else if (i === currentIndex && ultimaConcluida < ETAPAS.length - 1) {
                step.classList.add('current');
            }

            step.innerHTML = `
                <div class="dot"></div>
                <span class="label">${etapa.label}</span>
            `;
            container.appendChild(step);
        });
    }

    // Recebe mensagens das páginas de aula
    window.addEventListener('message', (event) => {
        const data = event.data;
        if (data && data.type === 'ETAPA_CONCLUIDA' && data.chave) {
            const progresso = carregarProgresso();
            progresso[data.chave] = true;
            salvarProgresso(progresso);
            renderizar(progresso);
        }
    });

    // Inicializa
    renderizar(carregarProgresso());
</script>
</body>
</html>
